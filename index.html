<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" /></noscript>
  </head>

  <body>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>

    <script>
      // Suppress expected Supabase auth errors on public pages
      const originalError = console.error;
      const originalWarn = console.warn;

      // Check if a message contains auth-related errors
      function isAuthError(msg) {
        const str = String(msg || '');
        return str.includes('AuthSessionMissingError') ||
               str.includes('useUserRole') ||
               str.includes('Auth session missing');
      }

      console.error = function(...args) {
        if (args.length > 0 && isAuthError(args[0])) {
          return; // Suppress expected auth error
        }
        originalError.apply(console, args);
      };

      console.warn = function(...args) {
        if (args.length > 0 && isAuthError(args[0])) {
          return; // Suppress expected auth warning
        }
        originalWarn.apply(console, args);
      };

      // Also suppress unhandled promise rejections for auth errors
      window.addEventListener('unhandledrejection', (event) => {
        if (isAuthError(event.reason)) {
          event.preventDefault();
        }
      });
    </script>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
